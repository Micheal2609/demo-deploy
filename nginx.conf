server {
    listen 80;          # Nginx lắng nghe ở cổng 80 (cổng HTTP mặc định)
    server_name _;      # Chấp nhận mọi tên miền hoặc IP trỏ đến

    location / {
        root /usr/share/nginx/html; # Thư mục chứa file index.html bên trong container
        index index.html;
        try_files $uri $uri/ /index.html; # Nếu không tìm thấy file, trả về index.html (tốt cho Single Page App)
    }

    # Cấu hình thêm để tối ưu (Tùy chọn)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
        root /usr/share/nginx/html;
        expires 1d; # Cache file tĩnh 1 ngày để tăng tốc
    }
}