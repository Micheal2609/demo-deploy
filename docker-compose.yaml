services:
  web-app:
    image: your-username/hello-app:latest
    volumes:
      # Chia sẻ thư mục /app (nơi chứa index.html) vào một "vùng nhớ chung" tên là html_data
      - html_data:/app

  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      # 1. Gắn file cấu hình từ bên ngoài vào trong Nginx
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 2. Lấy dữ liệu từ "vùng nhớ chung" html_data đổ vào thư mục phục vụ web của Nginx
      - html_data:/usr/share/nginx/html:ro
    depends_on:
      - web-app

volumes:
  html_data: # Khai báo vùng nhớ chung
