# Tên của Workflow
name: Deploy to Production

# Kích hoạt khi có hành động 'push' vào nhánh "main"
on:
  push:
    branches: ["staging"]

jobs:
  # Job 1: Build và đẩy Image lên Docker Hub
  build-and-push:
    runs-on: ubuntu-latest # Chạy trên máy ảo của GitHub để tiết kiệm tài nguyên máy bạn
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Tên image: <tên_user>/hello-app:latest
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hello-app:latest

  # Job 2: Triển khai trực tiếp trên máy ảo VMware
  deploy:
    needs: build-and-push
    # QUAN TRỌNG: Phải đặt là self-hosted để GitHub tìm đến máy ảo của bạn
    runs-on: self-hosted 
    
    steps:
      - name: Deploy application
        run: |
          # Di chuyển vào thư mục chứa dự án trên máy ảo
          # Thay 'app' bằng tên thư mục dự án thực tế của bạn
          cd /home/${{ secrets.SERVER_USER }}/app
          
          # Tải bản build mới nhất vừa đẩy lên Docker Hub về
          docker-compose pull
          
          # Khởi động lại container với image mới nhất
          # -d để chạy ngầm
          docker-compose up -d
          
          # Tùy chọn: Dọn dẹp các image cũ để tránh đầy ổ cứng máy ảo
          # docker image prune -f